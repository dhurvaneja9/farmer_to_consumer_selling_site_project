<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | DirectFarm</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .contact-section {
      max-width: 600px;
      margin: auto;
      padding: 20px;
    }
    .contact-form label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }
    .contact-form input, .contact-form textarea {
      width: 100%;
      padding: 8px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 3px;
    }
    .contact-form .btn {
      background-color: #28a745;
      color: white;
      padding: 10px 15px;
      border: none;
      border-radius: 3px;
      cursor: pointer;
    }
    .contact-form .btn:hover {
      background-color: #218838;
    }
  </style>                         
</head>
<body>
  <header>
    <h1>DirectFarm</h1>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="farmer.html">For Farmers</a></li>
        <li><a href="consumer.html">For Consumers</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
    </nav>
  </header>

  <section class="contact-section">
    <h2>Contact Us</h2>
    <p>Have a question, suggestion, or feedback? We'd love to hear from you!</p>

    <form class="contact-form">
      <label for="name">Your Name:</label>
      <input type="text" id="name" name="name" placeholder="Enter your name" required>

      <label for="email">Email Address:</label>
      <input type="email" id="email" name="email" placeholder="Enter your email" required>

      <label for="message">Message:</label>
      <textarea id="message" name="message" rows="5" placeholder="Type your message here..." required></textarea>

      <button type="submit" class="btn">Send Message</button>
    </form>
  </section>

  <footer>
    <p>&copy; 2025 DirectFarm | Connecting Farmers and Consumers</p>
  </footer>
</body>
</html>
